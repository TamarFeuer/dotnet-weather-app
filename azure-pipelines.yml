# ============================================================================
# Azure DevOps Pipeline - step 2: build the backend and the frontend
# ============================================================================
# The pipeline is now split into two JOBS, one per half of the project. A job is
# an independent unit of work that runs on its own fresh machine. Splitting them
# means:
#
#   - each half fails on its own, so a broken frontend cannot hide a broken
#     backend, and the run shows exactly which half is at fault,
#   - each job installs only the tools it needs (.NET for one, Node for the
#     other),
#   - they can run in parallel once more than one parallel job is available.
#     On the free tier only one job runs at a time, so they simply queue.
#
# Tests, quality gates and security scanning come in the next steps.

# WHEN: on every push to main, EXCEPT when only documentation changed.
#
# A path filter keeps the pipeline from running for changes that cannot possibly
# break the build. If every file in the push matches one of these excludes, no
# run is queued. Editing the README should not cost a build.
#
# Note: this only affects automatic (CI) triggers. You can always start a run by
# hand from the Azure DevOps UI.
trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'

# WHERE: a fresh, Microsoft-hosted Ubuntu machine (clean and reproducible -
# nobody's local mess is involved). Each job gets its own machine.
pool:
  vmImage: 'ubuntu-latest'

jobs:
  # ==========================================================================
  # JOB 1 - BACKEND (.NET / C#)
  # ==========================================================================
  - job: Backend
    displayName: 'Build the .NET backend'
    steps:
      # Install the .NET 10 SDK on the build machine.
      - task: UseDotNet@2
        displayName: 'Install .NET 10 SDK'
        inputs:
          packageType: 'sdk'
          version: '10.0.x'

      # Restore the NuGet dependencies (e.g. EntityFrameworkCore.Sqlite).
      - script: dotnet restore
        displayName: 'Restore dependencies'
        workingDirectory: 'weather-backend'

      # Build in Release. If this fails, this job fails.
      - script: dotnet build --configuration Release --no-restore
        displayName: 'Build backend'
        workingDirectory: 'weather-backend'

  # ==========================================================================
  # JOB 2 - FRONTEND (Angular / TypeScript)
  # ==========================================================================
  - job: Frontend
    displayName: 'Build the Angular frontend'
    steps:
      # Install Node.js. This is the frontend twin of UseDotNet: the machine
      # does not ship with the version we want, so the pipeline installs it.
      # (UseNode@1 replaces the deprecated NodeTool@0.)
      #
      # The version has to MATCH the one used locally. package-lock.json was
      # generated by npm 11 (which ships with Node 24). An older npm reads that
      # same lock file as incomplete and npm ci fails with "Missing ... from
      # lock file". Pinning the dependencies is not enough: the tool that reads
      # the lock file has to be pinned too.
      - task: UseNode@1
        displayName: 'Install Node.js 24'
        inputs:
          version: '24.x'

      # npm ci, not npm install. It installs exactly what package-lock.json
      # pins and fails if package.json and the lock file disagree. That makes
      # the build reproducible instead of "whatever npm resolved today".
      - script: npm ci
        displayName: 'Install dependencies'
        workingDirectory: 'weather-frontend'

      # Build the production bundle. If Angular or TypeScript does not compile,
      # this job fails.
      - script: npm run build
        displayName: 'Build frontend'
        workingDirectory: 'weather-frontend'

      # Run the unit tests.
      #
      # --watch=false is essential here. By default ng test runs the tests and
      # then STAYS OPEN, waiting for a file to change so it can re-run. That is
      # useful while developing, but in a pipeline the step would never finish
      # and the job would hang until it times out. The extra "--" tells npm to
      # pass the flag through to ng rather than eat it itself.
      - script: npm test -- --watch=false
        displayName: 'Test frontend'
        workingDirectory: 'weather-frontend'
